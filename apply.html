<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Brief Builder — Cashie.dev</title>
<meta name="description" content="Build your project brief step by step. One question at a time, with a live project snapshot and a ready-to-send consulting-style summary.">
<style>
  :root {
    --bg:          #182642;
    --bg-soft:     #223053;
    --panel:       rgba(50, 70, 120, 0.50);
    --panel-line:  rgba(200, 220, 255, 0.18);
    --ink:         #f1f5ff;
    --ink-soft:    #c8d9f8;
    --ink-mute:    #95a7cc;
    --plum:        #a78bfa;
    --plum-deep:   #7c5dfa;
    --cyan:        #e0ffff;
    --cream:       #c7e6ff;
    --green:       #6ee7b7;
    --amber:       #fcd34d;
    --red:         #f87171;
    --radius:      18px;
    --maxw:        1080px;
    --serif:       "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    --sans:        ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background:
      radial-gradient(1200px 600px at 78% -8%, rgba(167,139,250,0.28), transparent 60%),
      radial-gradient(900px 520px at -5% 12%, rgba(124,93,250,0.22), transparent 55%),
      radial-gradient(1100px 560px at 110% 105%, rgba(224,255,255,0.18), transparent 55%),
      linear-gradient(165deg, var(--bg) 0%, var(--bg-soft) 55%, var(--bg) 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }
  ::selection { background: linear-gradient(135deg, rgba(167,139,250,0.38), rgba(224,255,255,0.30)); color: #fff; }
  a { color: inherit; text-decoration: none; }

  /* ---------- Nav ---------- */
  header.nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(24,38,66,0.78);
    border-bottom: 1px solid var(--panel-line);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; padding: 0 28px;
    max-width: var(--maxw); margin: 0 auto;
  }
  .brand {
    font-family: var(--serif);
    font-size: 1.15rem; letter-spacing: 0.2px;
    display: flex; align-items: center; gap: 10px;
  }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: linear-gradient(135deg, var(--plum), var(--cyan));
    box-shadow: 0 0 14px 1px rgba(167,139,250,0.50);
  }
  .nav-back {
    font-size: 0.82rem; letter-spacing: 0.06em;
    color: var(--ink-soft); transition: color .2s ease;
  }
  .nav-back:hover { color: var(--ink); }
  .nav-links-apply { display: flex; gap: 24px; align-items: center; }
  .nav-links-apply a {
    font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-soft); transition: color .2s ease;
  }
  .nav-links-apply a:hover { color: var(--ink); }
  .nav-links-apply a.nav-cta {
    border: 1px solid var(--panel-line);
    padding: 8px 16px; border-radius: 999px;
    background: rgba(199,230,255,0.05);
    color: var(--cream) !important;
  }
  .nav-links-apply a.nav-cta:hover { border-color: var(--plum); }
  @media (max-width: 760px) { .nav-links-apply { display: none; } }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  /* ---------- Progress bar ---------- */
  .progress-bar {
    height: 4px;
    background: rgba(11,16,32,0.40);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--plum), var(--plum-deep), var(--cyan));
    transition: width .45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 0 4px 4px 0;
  }
  /* Progress text in nav */
  .nav-progress-text {
    font-size: 0.74rem; color: var(--ink-mute);
    letter-spacing: 0.04em;
    display: none;
  }
  .nav-progress-text.visible { display: inline; }

  /* ---------- Layout: wizard + snapshot ---------- */
  .builder-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 32px;
    padding: 40px 0 96px;
    align-items: start;
  }
  @media (max-width: 860px) {
    .builder-layout { grid-template-columns: 1fr; gap: 0; }
  }

  /* ---------- Wizard card ---------- */
  .wizard-card {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 24px;
    padding: 0;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    overflow: hidden;
    position: relative;
    min-height: 520px;
  }
  .wizard-card .glow {
    position: absolute; inset: auto -10% -60% 30%; height: 300px;
    background: radial-gradient(circle at 40% 40%, rgba(167,139,250,0.18), transparent 60%),
                radial-gradient(circle at 80% 90%, rgba(224,255,255,0.10), transparent 55%);
    pointer-events: none; z-index: 0;
  }

  .step-counter {
    display: flex; align-items: center; gap: 10px;
    padding: 28px 40px 0;
    position: relative; z-index: 1;
  }
  .step-counter .pill {
    font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase;
    font-weight: 600; color: var(--plum);
    border: 1px solid rgba(167,139,250,0.30);
    border-radius: 999px; padding: 5px 14px;
    background: rgba(167,139,250,0.08);
  }
  .step-counter .dots { display: flex; gap: 6px; }
  .step-counter .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(200,220,255,0.18);
    transition: background .3s ease, transform .3s ease;
  }
  .step-counter .dot.active {
    background: var(--plum);
    box-shadow: 0 0 10px rgba(167,139,250,0.55);
    transform: scale(1.2);
  }
  .step-counter .dot.done { background: rgba(167,139,250,0.45); }

  .step-content {
    padding: 28px 40px 0;
    position: relative; z-index: 1;
    animation: stepIn .4s ease;
  }
  @keyframes stepIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .step-content h2 {
    font-family: var(--serif); font-weight: 500;
    font-size: clamp(1.6rem, 3.5vw, 2.3rem);
    line-height: 1.12; letter-spacing: -0.015em;
    margin-bottom: 10px;
  }
  .step-content .lede {
    color: var(--ink-soft); font-size: 1rem; margin-bottom: 28px;
    max-width: 52ch;
  }

  /* ---------- Option cards ---------- */
  .option-grid { display: grid; gap: 12px; margin-bottom: 28px; }
  .option-card {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 20px;
    border: 1.5px solid var(--panel-line);
    border-radius: 14px;
    background: rgba(11,16,32,0.22);
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease, transform .18s ease;
    user-select: none;
  }
  .option-card:hover {
    border-color: rgba(167,139,250,0.40);
    background: rgba(11,16,32,0.32);
    transform: translateY(-1px);
  }
  .option-card.selected {
    border-color: var(--plum);
    background: rgba(167,139,250,0.10);
    box-shadow: 0 0 0 3px rgba(167,139,250,0.10);
  }
  .option-card .icon {
    flex-shrink: 0;
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    background: rgba(167,139,250,0.12);
    border: 1px solid rgba(167,139,250,0.25);
  }
  .option-card .label { font-size: 1rem; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .option-card .desc { font-size: 0.86rem; color: var(--ink-soft); line-height: 1.45; }
  .option-card .check {
    flex-shrink: 0; margin-left: auto;
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--panel-line);
    display: flex; align-items: center; justify-content: center;
    transition: all .2s ease;
  }
  .option-card.selected .check { border-color: var(--plum); background: var(--plum); }
  .option-card.selected .check::after { content: "✓"; color: #182642; font-size: 0.85rem; font-weight: 700; }
  .option-card input[type="radio"] { display: none; }

  /* ---------- Unsupported card ---------- */
  .option-card.unsupported {
    opacity: 0.5; cursor: not-allowed;
  }
  .option-card.unsupported:hover { transform: none; border-color: var(--panel-line); background: rgba(11,16,32,0.22); }
  .option-card.unsupported .check {
    border-color: var(--red); background: rgba(248,113,113,0.15);
  }
  .option-card.unsupported .check::after { content: "✕"; color: var(--red); font-size: 0.8rem; font-weight: 700; }
  .option-card.unsupported .desc { color: var(--red); }

  /* ---------- Text inputs ---------- */
  .input-field { margin-bottom: 20px; }
  .input-field label {
    display: block; font-size: 0.88rem; font-weight: 600;
    color: var(--ink); margin-bottom: 7px;
  }
  .input-field .hint { font-size: 0.85rem; color: var(--ink-soft); margin-bottom: 10px; }
  .input-field input[type="text"],
  .input-field textarea {
    width: 100%;
    background: rgba(11,16,32,0.28);
    border: 1.5px solid var(--panel-line);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 0.98rem;
    outline: none;
    transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
  }
  .input-field input::placeholder,
  .input-field textarea::placeholder { color: var(--ink-mute); }
  .input-field input:focus,
  .input-field textarea:focus {
    border-color: var(--plum);
    background: rgba(11,16,32,0.38);
    box-shadow: 0 0 0 3px rgba(167,139,250,0.12);
  }
  .input-field textarea { min-height: 120px; resize: vertical; }

  /* ---------- Navigation buttons ---------- */
  .step-nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 40px 36px;
    position: relative; z-index: 1;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 999px;
    font-size: 0.92rem; font-weight: 600;
    cursor: pointer; border: none;
    transition: transform .18s ease, background .2s ease, border-color .2s ease, opacity .2s ease;
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--plum) 0%, var(--plum-deep) 60%, rgba(224,255,255,0.30) 100%);
    color: #182642;
  }
  .btn-primary:not(:disabled):hover { transform: translateY(-2px); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--panel-line);
    color: var(--ink-soft);
  }
  .btn-ghost:not(:disabled):hover { border-color: var(--plum); color: var(--ink); }
  .btn-back { font-size: 0.88rem; }

  /* ---------- Snapshot panel ---------- */
  .snapshot-panel {
    position: sticky; top: 88px;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 20px;
    padding: 24px 22px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    overflow: hidden;
  }
  .snapshot-panel .snap-glow {
    position: absolute; inset: auto -30% -60% -10%; height: 200px;
    background: radial-gradient(circle at 40% 40%, rgba(167,139,250,0.16), transparent 60%);
    pointer-events: none;
  }
  .snapshot-panel h3 {
    font-family: var(--serif); font-weight: 500;
    font-size: 1.08rem; margin-bottom: 4px;
    position: relative;
  }
  .snapshot-panel .snap-sub {
    font-size: 0.82rem; color: var(--ink-mute); margin-bottom: 20px;
    position: relative;
  }

  /* Estimate display */
  .est-summary { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; position: relative; }
  .est-summary .est-big {
    font-family: var(--serif); font-size: 1.85rem; color: var(--cream); font-weight: 500; line-height: 1;
  }
  .est-summary .est-small { font-size: 0.85rem; color: var(--ink-soft); }
  .est-summary .est-big.empty { color: var(--ink-mute); }

  .est-label-mini {
    font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-mute); font-weight: 600;
    margin-bottom: 16px; position: relative;
  }

  .est-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0;
    border-top: 1px solid var(--panel-line);
    position: relative;
  }
  .est-row .est-label { font-size: 0.84rem; color: var(--ink-soft); }
  .est-row .est-value {
    font-family: var(--serif); font-size: 0.98rem; color: var(--cream); font-weight: 500;
    text-align: right; max-width: 160px;
  }
  .est-row .est-value.empty { color: var(--ink-mute); font-style: italic; font-size: 0.82rem; font-family: var(--sans); }

  /* Budget fit badge */
  .fit-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.80rem; font-weight: 600;
    padding: 4px 10px; border-radius: 999px;
    font-family: var(--sans);
  }
  .fit-badge.good { background: rgba(110,231,183,0.15); color: var(--green); border: 1px solid rgba(110,231,183,0.30); }
  .fit-badge.warn { background: rgba(252,211,77,0.15); color: var(--amber); border: 1px solid rgba(252,211,77,0.30); }
  .fit-badge.over { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.30); }

  /* Confidence badge */
  .conf-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.78rem; font-weight: 600;
    padding: 4px 12px; border-radius: 999px;
    font-family: var(--sans);
  }
  .conf-badge.high { background: rgba(110,231,183,0.12); color: var(--green); border: 1px solid rgba(110,231,183,0.25); }
  .conf-badge.medium { background: rgba(252,211,77,0.12); color: var(--amber); border: 1px solid rgba(252,211,77,0.25); }
  .conf-badge.low { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }

  /* Default snapshot content */
  .snap-default { position: relative; }
  .snap-default .snap-default-label {
    font-size: 0.74rem; letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--ink-mute); font-weight: 600;
    margin-top: 16px; margin-bottom: 8px;
  }
  .snap-default ul {
    margin: 0 0 14px; padding-left: 18px;
    list-style: none;
  }
  .snap-default li {
    font-size: 0.86rem; color: var(--ink-soft); line-height: 1.6;
    position: relative; padding-left: 14px;
  }
  .snap-default li::before {
    content: ""; position: absolute; left: 0; top: 0.65em;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--plum);
  }

  .snap-foot {
    font-size: 0.78rem; color: var(--ink-mute); line-height: 1.5;
    position: relative;
    padding-top: 14px; margin-top: 14px; border-top: 1px solid var(--panel-line);
  }

  /* ---------- Mobile snapshot ---------- */
  .mobile-snapshot { display: none; }
  @media (max-width: 860px) {
    .snapshot-panel { display: none; }
    .mobile-snapshot { display: block; }
  }
  .mobile-snapshot {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 24px;
  }
  .mobile-snapshot h4 {
    font-family: var(--serif); font-weight: 500;
    font-size: 0.95rem; margin-bottom: 8px;
  }
  .mobile-snapshot .est-row { padding: 8px 0; }
  .mobile-snapshot .est-summary .est-big { font-size: 1.5rem; }

  /* ---------- Summary screen ---------- */
  .summary-screen {
    padding: 28px 40px 36px;
    position: relative; z-index: 1;
    animation: stepIn .4s ease;
  }
  .summary-screen h2 {
    font-family: var(--serif); font-weight: 500;
    font-size: clamp(1.6rem, 3.5vw, 2.3rem);
    margin-bottom: 8px;
  }
  .summary-screen .lede {
    color: var(--ink-soft); font-size: 1rem; margin-bottom: 28px;
  }
  .summary-brief {
    border: 1px solid var(--panel-line);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
    background: rgba(11,16,32,0.18);
  }
  .brief-header {
    padding: 20px 24px;
    background: linear-gradient(135deg, rgba(167,139,250,0.12), rgba(224,255,255,0.06));
    border-bottom: 1px solid var(--panel-line);
  }
  .brief-header .brief-title {
    font-family: var(--serif); font-weight: 500;
    font-size: 1.35rem; margin-bottom: 4px;
  }
  .brief-header .brief-sub {
    font-size: 0.84rem; color: var(--ink-mute);
  }
  .brief-header .brief-badges {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
  }
  .brief-section { padding: 14px 24px; border-bottom: 1px solid var(--panel-line); }
  .brief-section:last-child { border-bottom: none; }
  .brief-section .bs-label {
    font-size: 0.76rem; letter-spacing: 0.10em; text-transform: uppercase;
    color: var(--ink-mute); font-weight: 600;
    margin-bottom: 4px;
  }
  .brief-section .bs-value {
    font-size: 0.96rem; color: var(--ink);
  }
  .brief-section .bs-value.muted { color: var(--ink-mute); font-style: italic; }
  .brief-section .bs-value.bold { font-weight: 600; font-family: var(--serif); font-size: 1.05rem; color: var(--cream); }
  .brief-section .bs-list {
    font-size: 0.92rem; color: var(--ink-soft); line-height: 1.6;
    padding-left: 16px; margin: 4px 0 0;
  }
  .brief-section .bs-list li { list-style: none; position: relative; padding-left: 12px; }
  .brief-section .bs-list li::before {
    content: "·"; position: absolute; left: 0; color: var(--plum); font-weight: 700;
  }

  .summary-actions { display: flex; gap: 14px; flex-wrap: wrap; }
  .copy-feedback {
    display: none;
    font-size: 0.86rem; color: var(--cyan);
    padding: 12px 0;
    animation: stepIn .3s ease;
  }
  .copy-feedback.show { display: block; }

  /* ---------- Welcome screen ---------- */
  .welcome-screen {
    text-align: center;
    padding: 80px 40px;
    position: relative; z-index: 1;
  }
  .welcome-screen .welcome-tag {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 0.8rem; color: var(--ink-soft);
    border: 1px solid var(--panel-line); border-radius: 999px;
    padding: 7px 15px; margin-bottom: 28px;
    background: var(--panel);
  }
  .welcome-screen .welcome-tag .pip {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--cyan); box-shadow: 0 0 12px var(--cyan);
  }
  .welcome-screen h2 {
    font-family: var(--serif); font-weight: 500;
    font-size: clamp(2rem, 5vw, 3rem);
    line-height: 1.1; margin-bottom: 18px; letter-spacing: -0.02em;
  }
  .welcome-screen h2 em { font-style: italic; color: var(--cream); }
  .welcome-screen p {
    color: var(--ink-soft); max-width: 48ch; margin: 0 auto 36px;
    font-size: 1.05rem; line-height: 1.6;
  }
  .welcome-features {
    display: flex; gap: 28px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .welcome-feature {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.86rem; color: var(--ink-soft);
  }
  .welcome-feature .wf-icon { color: var(--plum); font-size: 1.1rem; }

  /* ---------- Unsupported alert ---------- */
  .unsupported-alert {
    display: none;
    background: rgba(248,113,113,0.12);
    border: 1px solid rgba(248,113,113,0.30);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 0.92rem;
    color: var(--ink-soft);
    animation: stepIn .3s ease;
  }
  .unsupported-alert.show { display: block; }
  .unsupported-alert strong { color: var(--red); }

  /* ---------- Footer ---------- */
  footer {
    padding: 36px 28px; border-top: 1px solid var(--panel-line);
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center;
    color: var(--ink-mute); font-size: 0.84rem;
    max-width: var(--maxw); margin: 0 auto;
  }
  footer .brand { font-size: 1rem; color: var(--ink-soft); }
  footer .dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--plum), var(--cyan)); display: inline-block; }

  @media (max-width: 560px) {
    .step-content, .step-nav, .summary-screen { padding-left: 24px; padding-right: 24px; }
    .step-counter { padding: 22px 24px 0; }
    .nav-inner { padding: 0 18px; }
    .wrap { padding: 0 18px; }
    .brief-section { padding: 12px 18px; }
    .brief-header { padding: 16px 18px; }
    .welcome-screen { padding: 56px 24px; }
    .option-card { padding: 14px 16px; }
    .nav-progress-text { display: none !important; }
  }
  @media (prefers-reduced-motion: reduce) {
    .step-content, .summary-screen { animation: none; }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html"><span class="dot"></span> Cashie.dev</a>
    <nav class="nav-links-apply">
      <a href="products.html">Products</a>
      <a href="index.html#services">Services</a>

<script>
(function() {
  "use strict";

  // ---- Unsupported configurations ----
  var unsupportedPlatforms = ["ios", "android", "windows"];

  // ---- Step definitions ----
  var steps = [
    {
      id: "welcome",
      type: "welcome",

        { value: "react",     label: "React / TypeScript", desc: "Web app or dashboard frontend",     icon: "⚛" },
        { value: "node",      label: "Node.js",           desc: "Server or automation runtime",       icon: "🟢" },

        { value: "1k-3k",    label: "A$1,000 – A$3,000", desc: "Standard small project",         icon: "💰" },
        { value: "3k-5k",    label: "A$3,000 – A$5,000", desc: "Multi-feature build",            icon: "🏦" },
        { value: "5k-10k",   label: "A$5,000 – A$10,000", desc: "Complex system or dashboard",    icon: "🏆" },
        { value: "10k+",     label: "A$10,000+",       desc: "Large or ongoing project",        icon: "💎" },
        { value: "not-sure", label: "Not sure yet",    desc: "I'll suggest a budget",           icon: "🤔" }
      ]
    },
    {
      id: "timeline",
      type: "choice",
      question: "When do you need it?",
      lede: "Urgent, flexible, or just exploring?",
      options: [
        { value: "asap",     label: "ASAP",           desc: "Needed yesterday",       icon: "🔥" },
        { value: "1-2-weeks", label: "1–2 weeks",      desc: "Within a couple weeks",   icon: "⏱" },
        { value: "1-month",  label: "Within a month",  desc: "Standard timeframe",       icon: "📅" },
        { value: "flexible", label: "Flexible",        desc: "No hard deadline",         icon: "🌿" },
        { value: "exploring", label: "Just exploring", desc: "Scoping it out",          icon: "🔍" }
      ]
    },
    {
      id: "details",
      type: "text",
      question: "What's the problem you're solving?",
      lede: "A sentence or two about the problem, the user, and what \"done\" looks like.",
      fields: [
        { id: "description", label: "Project description", hint: "e.g. I need a booking page that lets clients pick a service and send an enquiry…", type: "textarea", required: true },
        { id: "features",    label: "Key features (optional)", hint: "List the main things the app needs to do — one per line.", type: "textarea", required: false },
        { id: "links",       label: "Links or examples (optional)", hint: "Existing site, competitor, sketches, Notion docs", type: "textarea", required: false }
      ]
    },
    {
      id: "contact",
      type: "text",
      question: "How do I reach you?",
      lede: "Last step — just your name and contact details.",
      fields: [
        { id: "name",           label: "Your name", hint: "Who should I address the reply to?", type: "text", required: true },
        { id: "project",        label: "Business or project name (optional)", hint: "The company or working title", type: "text", required: false },
        { id: "contact-method", label: "Preferred contact method", hint: "WhatsApp, iMessage, Discord, Telegram, etc.", type: "text", required: true },
        { id: "contact-details", label: "Contact handle / details", hint: "@username or best way to reach you", type: "text", required: true }
      ]
    },
    {
      id: "summary",
      type: "summary",
      question: "Your project brief",
      lede: "Here's your consulting-style brief. Copy it and send it through, or go back to edit."
    }
  ];

  // ---- State ----
  var state = { stepIndex: 0, answers: {} };
  var contentSteps = steps.filter(function(s){ return s.type === "choice" || s.type === "text"; });
  var totalContentSteps = contentSteps.length;

  // ---- Pricing engine — independent of customer budget ----
  // Base prices in AUD per project type
  var typePricing = {
    "desktop-app":  { base: 3000, range: 5000, label: "Desktop app" },
    "internal-tool": { base: 1200, range: 2300, label: "Internal tool" },
    "automation":   { base: 600,  range: 1400, label: "Automation" },
    "dashboard":    { base: 2800, range: 4200, label: "Dashboard" },
    "website":      { base: 800,  range: 2200, label: "Website / landing page" },
    "improvement":  { base: 1000, range: 4000, label: "Existing app improvement" },
    "other":        { base: 1500, range: 3500, label: "Other" }
  };

  // Stack multipliers
  var stackMultipliers = {
    "python":  1.0,
    "swift":   1.25,
    "react":   1.15,
    "node":    1.0,
    "bash":    0.7,
    "tauri":   1.2,
    "mixed":   1.15,
    "not-sure": 1.0
  };

  // Platform multipliers
  var platformMultipliers = {
    "macos": 1.0,
    "linux": 0.95,
    "mac-linux": 1.15,
    "web-dashboard": 1.0,
    "ios": 1.0,
    "android": 1.0,
    "windows": 1.0
  };

  // Size multipliers
  var sizeMultipliers = {
    "small": 0.5,
    "medium": 1.0,
    "large": 2.2,
    "not-sure": 1.0
  };

  // Timeline urgency multipliers
  var timelineMultipliers = {
    "asap": 1.2,
    "1-2-weeks": 1.05,
    "1-month": 1.0,
    "flexible": 0.95,
    "exploring": 1.0
  };

  // Budget ranges for comparison (AUD)
  var budgetRanges = {
    "under-1k": { min: 0,    max: 1000 },
    "1k-3k":    { min: 1000, max: 3000 },
    "3k-5k":    { min: 3000, max: 5000 },
    "5k-10k":   { min: 5000, max: 10000 },
    "10k+":     { min: 10000, max: 999999 },
    "not-sure": { min: null, max: null }
  };

  // Labels for display
  var labels = {
    type: {
      "desktop-app": "Desktop app", "internal-tool": "Internal tool", "automation": "Automation",
      "dashboard": "Dashboard", "website": "Website / landing page", "improvement": "Existing app improvement", "other": "Other"
    },
    stack: {
      "python": "Python", "swift": "Swift / macOS", "react": "React / TypeScript",
      "node": "Node.js", "bash": "Bash / CLI", "tauri": "Tauri desktop",
      "mixed": "Mixed codebase", "not-sure": "Not sure yet (I'll recommend)"
    },
    platform: {
      "macos": "macOS", "linux": "Linux", "mac-linux": "macOS + Linux",
      "web-dashboard": "Web dashboard", "ios": "iOS (unsupported)", "android": "Android (unsupported)", "windows": "Windows (unsupported)"
    },
    size: {
      "small": "Small · 1–3 days", "medium": "Medium · 1–2 weeks",
      "large": "Large · 1+ month", "not-sure": "Not sure"
    },
    budget: {
      "under-1k": "Under A$1,000", "1k-3k": "A$1,000 – A$3,000",
      "3k-5k": "A$3,000 – A$5,000", "5k-10k": "A$5,000 – A$10,000",
      "10k+": "A$10,000+", "not-sure": "Not sure yet"
    },
    timeline: {
      "asap": "ASAP", "1-2-weeks": "1–2 weeks", "1-month": "Within a month",
      "flexible": "Flexible", "exploring": "Just exploring"
    }
  };

  // ---- Calculate estimate independently ----
  function calculateEstimate() {
    var a = state.answers;
    var typeData = typePricing[a.type];
    if (!typeData) return null;

    var base = typeData.base;
    var range = typeData.range;

    // Stack multiplier
    var stackMult = stackMultipliers[a.stack] || 1.0;

    // Platform multiplier
    var platMult = platformMultipliers[a.platform] || 1.0;

    // Size multiplier
    var sizeMult = sizeMultipliers[a.size] || 1.0;

    // Timeline multiplier
    var tlMult = timelineMultipliers[a.timeline] || 1.0;

    // Feature count modifier (from details.features textarea)
    var featureCount = 0;
    if (a.features && a.features.trim()) {
      featureCount = a.features.trim().split("\n").filter(function(l){ return l.trim(); }).length;
    }
    var featureMult = 1.0 + (featureCount * 0.05); // +5% per feature

    // Calculate
    var minRaw = base * stackMult * platMult * sizeMult * tlMult * featureMult;
    var maxRaw = minRaw + (range * sizeMult * stackMult);

    // Round to nearest $100
    var minVal = Math.round(minRaw / 100) * 100;
    var maxVal = Math.round(maxRaw / 100) * 100;

    // Clamp minimums
    if (minVal < 300) minVal = 300;
    if (maxVal < minVal + 400) maxVal = minVal + 400;

    return {
      min: minVal,
      max: maxVal,
      minStr: "A$" + minVal.toLocaleString(),
      maxStr: "A$" + maxVal.toLocaleString(),
      rangeStr: "A$" + minVal.toLocaleString() + "–A$" + maxVal.toLocaleString()
    };
  }

  // ---- Budget fit analysis ----
  function getBudgetFit() {
    var est = calculateEstimate();
    var a = state.answers;
    if (!est) return null;
    if (!a.budget || a.budget === "not-sure") return null;
    var br = budgetRanges[a.budget];
    if (!br) return null;

    // Good match: budget overlaps with estimate range
    if (br.max >= est.min * 0.85 && br.min <= est.max * 1.05) {
      return { level: "good", label: "✓ Good Match", class: "good" };
    }
    // Stretch: budget is below estimate but not by much
    if (br.max < est.min * 0.85 && br.max >= est.min * 0.55) {
      return { level: "warn", label: "⚠ Stretch budget", class: "warn" };
    }
    // Over budget: budget is way below estimate
    if (br.max < est.min * 0.55) {
      return { level: "over", label: "⚠ Budget likely too low", class: "warn" };
    }
    // Budget much higher than estimate — still good
    return { level: "good", label: "✓ Good Match", class: "good" };
  }

  // ---- Confidence score ----
  function getConfidence() {
    var a = state.answers;
    var score = 0;
    var maxScore = 0;

    // Type selected
    maxScore += 15;
    if (a.type) score += 15;

    // Stack certainty
    maxScore += 15;
    if (a.stack && a.stack !== "not-sure") score += 15;
    else if (a.stack === "not-sure") score += 7;

    // Platform selected
    maxScore += 10;
    if (a.platform && unsupportedPlatforms.indexOf(a.platform) === -1) score += 10;

    // Size selected
    maxScore += 10;
    if (a.size && a.size !== "not-sure") score += 10;
    else if (a.size === "not-sure") score += 5;

    // Budget selected
    maxScore += 10;
    if (a.budget && a.budget !== "not-sure") score += 10;
    else if (a.budget === "not-sure") score += 5;

    // Timeline selected
    maxScore += 10;
    if (a.timeline) score += 10;

    // Description detail
    maxScore += 20;
    if (a.description && a.description.trim()) {
      var descLen = a.description.trim().length;
      if (descLen > 100) score += 20;
      else if (descLen > 40) score += 12;
      else score += 6;
    }

    // Features list
    maxScore += 10;
    if (a.features && a.features.trim()) {
      var featCount = a.features.trim().split("\n").filter(function(l){ return l.trim(); }).length;
      if (featCount >= 3) score += 10;
      else if (featCount >= 1) score += 5;
    }

    var pct = Math.round((score / maxScore) * 100);

    if (pct >= 70) return { level: "high", label: "HIGH", pct: pct };
    if (pct >= 40) return { level: "medium", label: "MEDIUM", pct: pct };
    return { level: "low", label: "LOW", pct: pct };
  }

  // ---- DOM refs ----
  var elWizard    = document.getElementById("wizardContent");
  var elProgress  = document.getElementById("progressFill");
  var elNavProg   = document.getElementById("navProgressText");
  var elSnapTitle = document.getElementById("snapTitle");
  var elSnapSub   = document.getElementById("snapSub");
  var elSnap      = document.getElementById("snapContent");
  var elSnapFoot  = document.getElementById("snapFoot");

  // ---- Helpers ----
  function esc(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }

  function fmtAUD(n) {
    return "A$" + n.toLocaleString();
  }

  // ---- Update progress bar + nav text ----
  function updateProgress() {
    var idx = state.stepIndex;
    if (idx === 0) {
      elProgress.style.width = "0%";
      elNavProg.textContent = "";
      elNavProg.classList.remove("visible");
      return;
    }
    if (idx === steps.length - 1) {
      elProgress.style.width = "100%";
      elNavProg.textContent = "Complete";
      elNavProg.classList.add("visible");
      return;
    }
    var pct = Math.round((idx / (steps.length - 1)) * 100);
    elProgress.style.width = pct + "%";
    var stepNum = getChoiceNumber(steps[idx]);
    elNavProg.textContent = "Step " + stepNum + " of " + totalContentSteps + " · " + pct + "%";
    elNavProg.classList.add("visible");
  }

  // ---- Update snapshot panel ----
  function updateSnapshot() {
    var a = state.answers;
    var est = calculateEstimate();
    var fit = getBudgetFit();
    var conf = getConfidence();

    // If no answers yet — show defaults
    var hasAnyAnswer = Object.keys(a).length > 0 && (a.type || a.stack || a.platform || a.size || a.budget || a.timeline);

    if (!hasAnyAnswer) {
      elSnapSub.textContent = "Typical ranges for Cashie projects.";
      var html = '';
      html += '<div class="snap-default">';
      html += '<div class="snap-default-label">Typical Projects</div>';
      html += '<ul><li>Swift utilities</li><li>Tauri desktop apps</li><li>Internal dashboards</li><li>Automation tools</li></ul>';
      html += '<div class="snap-default-label">Typical Investment</div>';
      html += '<p style="font-family:var(--serif);font-size:1.4rem;color:var(--cream);margin:0 0 14px;">A$500–A$5,000</p>';
      html += '<div class="snap-default-label">Typical Timeline</div>';
      html += '<p style="font-family:var(--serif);font-size:1.05rem;color:var(--cream);margin:0;">1–4 weeks</p>';
      html += '</div>';
      elSnap.innerHTML = html;
      elSnapFoot.style.display = "block";
      return;
    }

    // Live snapshot with answers
    elSnapSub.textContent = "Updates as you answer.";

    var html = '';

    // Estimate
    html += '<div class="est-label-mini">Estimated Investment</div>';
    html += '<div class="est-summary">';
    if (est) {
      html += '<span class="est-big">' + esc(est.minStr) + '</span>';
      html += '<span class="est-small">– ' + esc(est.maxStr) + '</span>';
    } else {
      html += '<span class="est-big empty">A$500–A$5,000</span>';
      html += '<span class="est-small">typical range</span>';
    }
    html += '</div>';

    // Stats rows
    html += '<div class="est-row"><span class="est-label">Project</span><span class="est-value ' + (a.type ? '' : 'empty') + '">' + esc(a.type ? labels.type[a.type] : 'Not selected') + '</span></div>';
    html += '<div class="est-row"><span class="est-label">Platform</span><span class="est-value ' + (a.platform ? '' : 'empty') + '">' + esc(a.platform ? labels.platform[a.platform] : 'Not selected') + '</span></div>';
    html += '<div class="est-row"><span class="est-label">Stack</span><span class="est-value ' + (a.stack ? '' : 'empty') + '">' + esc(a.stack ? labels.stack[a.stack] : 'Not selected') + '</span></div>';
    html += '<div class="est-row"><span class="est-label">Complexity</span><span class="est-value ' + (a.size ? '' : 'empty') + '">' + esc(a.size ? labels.size[a.size] : 'Not selected') + '</span></div>';
    html += '<div class="est-row"><span class="est-label">Timeline</span><span class="est-value ' + (a.timeline ? '' : 'empty') + '">' + esc(a.timeline ? labels.timeline[a.timeline] : 'Not selected') + '</span></div>';

    // Customer budget vs budget fit
    if (a.budget && a.budget !== "not-sure") {
      html += '<div class="est-row"><span class="est-label">Your Budget</span><span class="est-value">' + esc(labels.budget[a.budget]) + '</span></div>';
      if (fit) {
        html += '<div class="est-row"><span class="est-label">Budget Fit</span><span class="est-value"><span class="fit-badge ' + esc(fit.class) + '">' + esc(fit.label) + '</span></span></div>';
      }
    }

    // Confidence score
    if (conf) {
      html += '<div class="est-row"><span class="est-label">Confidence</span><span class="est-value"><span class="conf-badge ' + esc(conf.level) + '">' + esc(conf.label) + ' · ' + conf.pct + '%</span></span></div>';
    }

    elSnap.innerHTML = html;
    elSnapFoot.style.display = "block";
  }

  // ---- Render step dots ----
  function renderDots() {
    var step = steps[state.stepIndex];
    if (step.type === "welcome" || step.type === "summary") return "";
    var activeIdx = contentSteps.indexOf(step);
    if (activeIdx < 0) return "";

    var html = '<div class="dots">';
    for (var i = 0; i < contentSteps.length; i++) {
      var cls = "";
      if (i < activeIdx) cls = "done";
      else if (i === activeIdx) cls = "active";
      html += '<span class="dot ' + cls + '"></span>';
    }
    html += '</div>';
    return html;
  }

  // ---- Render functions ----
  function render() {
    var step = steps[state.stepIndex];
    var html = "";

    if (step.type === "welcome")          html = renderWelcome(step);
    else if (step.type === "choice")      html = renderChoice(step);
    else if (step.type === "text")         html = renderTextStep(step);
    else if (step.type === "summary")      html = renderSummary(step);

    elWizard.innerHTML = html;
    attachHandlers();
    updateProgress();
    updateSnapshot();

    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function renderWelcome(step) {
    var feats = step.features.map(function(f) {
      return '<div class="welcome-feature"><span class="wf-icon">' + f.icon + '</span>' + esc(f.text) + '</div>';
    }).join("");

    return '' +
      '<div class="welcome-screen">' +
        '<div class="welcome-tag"><span class="pip"></span> Project Brief Builder</div>' +
        '<h2>' + step.title + '</h2>' +
        '<p>' + step.lede + '</p>' +
        '<div class="welcome-features">' + feats + '</div>' +
        '<button class="btn btn-primary" data-action="start">' + esc(step.cta) + '</button>' +
      '</div>';
  }

  function renderChoice(step) {
    var counter = renderDots();
    var optionsHtml = step.options.map(function(opt) {
      var selected = state.answers[step.id] === opt.value ? " selected" : "";
      var unsup = opt.unsupported ? " unsupported" : "";
      return '' +
        '<label class="option-card' + selected + unsup + '" data-value="' + esc(opt.value) + '"' + (opt.unsupported ? '' : '') + '>' +
          '<span class="icon">' + opt.icon + '</span>' +
          '<span>' +
            '<div class="label">' + esc(opt.label) + '</div>' +
            '<div class="desc">' + esc(opt.desc) + '</div>' +
          '</span>' +
          '<span class="check"></span>' +
        '</label>';
    }).join("");

    // Check if current answer is unsupported
    var showAlert = state.answers[step.id] && step.options.some(function(o) {
      return o.value === state.answers[step.id] && o.unsupported;
    });

    var alertHtml = showAlert ? '<div class="unsupported-alert show"><strong>Not currently supported.</strong> I focus on macOS, Linux, and web dashboards. I don\'t take iOS, Android, or Windows-only projects. Feel free to pick a different platform, or describe it as "Other" in the first step.</div>' : '';

    // If showing unsupported, the "Next" should be disabled
    var nextDisabled = showAlert ? " disabled" : (state.answers[step.id] ? "" : " disabled");

    return '' +
      '<div class="step-counter">' +
        '<span class="pill">Step ' + getChoiceNumber(step) + ' of ' + totalContentSteps + '</span>' +
        counter +
      '</div>' +
      '<div class="step-content">' +
        alertHtml +
        '<h2>' + esc(step.question) + '</h2>' +
        '<p class="lede">' + esc(step.lede) + '</p>' +
        '<div class="option-grid">' + optionsHtml + '</div>' +
      '</div>' +
      '<div class="step-nav">' +
        '<button class="btn btn-ghost btn-back" data-action="back">← Back</button>' +
        '<button class="btn btn-primary" data-action="next"' + nextDisabled + '>Next →</button>' +
      '</div>';
  }

  function renderTextStep(step) {
    var counter = renderDots();
    var fieldsHtml = step.fields.map(function(f) {
      var val = state.answers[f.id] || "";
      var tag = f.type === "textarea" ? "textarea" : 'input type="text"';
      var closeTag = f.type === "textarea" ? '>' + esc(val) + '</textarea>' : ' value="' + esc(val) + '">';
      var req = f.required ? " <span style=\"color:var(--ink-mute);font-weight:400;\">(required)</span>" : "";
      return '' +
        '<div class="input-field">' +
          '<label>' + esc(f.label) + req + '</label>' +
          '<p class="hint">' + esc(f.hint) + '</p>' +
          '<' + tag + ' id="field-' + f.id + '" data-field="' + esc(f.id) + '" data-required="' + f.required + '"' +
          (f.type === "textarea" ? "" : ' autocomplete="off"') + closeTag +
        '</div>';
    }).join("");

    return '' +
      '<div class="step-counter">' +
        '<span class="pill">Step ' + getChoiceNumber(step) + ' of ' + totalContentSteps + '</span>' +
        counter +
      '</div>' +
      '<div class="step-content">' +
        '<h2>' + esc(step.question) + '</h2>' +
        '<p class="lede">' + esc(step.lede) + '</p>' +
        fieldsHtml +
      '</div>' +
      '<div class="step-nav">' +
        '<button class="btn btn-ghost btn-back" data-action="back">← Back</button>' +
        '<button class="btn btn-primary" data-action="next">Next →</button>' +
      '</div>';
  }

  function renderSummary(step) {
    var a = state.answers;
    var est = calculateEstimate();
    var fit = getBudgetFit();
    var conf = getConfidence();

    // Build features list
    var featuresList = "";
    if (a.features && a.features.trim()) {
      var feats = a.features.trim().split("\n").filter(function(l){ return l.trim(); });
      featuresList = feats.map(function(f) {
        return '<li>' + esc(f.trim()) + '</li>';
      }).join("");
    }

    // Build description
    var descHtml = a.description && a.description.trim()
      ? esc(a.description.trim())
      : '<span class="muted">No description provided</span>';

    // Build links
    var linksHtml = a.links && a.links.trim() ? esc(a.links.trim()) : '<span class="muted">None provided</span>';

    // Contact
    var contactHtml = "";
    if (a.name) contactHtml += esc(a.name);
    if (a.project) contactHtml += " · " + esc(a.project);
    if (a["contact-method"]) contactHtml += " · " + esc(a["contact-method"]);
    if (a["contact-details"]) contactHtml += " · " + esc(a["contact-details"]);
    if (!contactHtml.trim()) contactHtml = '<span class="muted">Not provided</span>';

    var html = '' +
      '<div class="step-counter">' +
        '<span class="pill">Summary</span>' +
      '</div>' +
      '<div class="summary-screen">' +
        '<h2>' + esc(step.question) + '</h2>' +
        '<p class="lede">' + esc(step.lede) + '</p>' +
        '<div class="summary-brief">';

    // Brief header
    html += '<div class="brief-header">';
    html += '<div class="brief-title">Cashie Project Brief</div>';
    html += '<div class="brief-sub">Generated by the Cashie Project Brief Builder</div>';
    html += '<div class="brief-badges">';
    if (conf) html += '<span class="conf-badge ' + esc(conf.level) + '">Confidence: ' + esc(conf.label) + '</span>';
    if (fit)  html += '<span class="fit-badge ' + esc(fit.class) + '">' + esc(fit.label) + '</span>';
    html += '</div>';
    html += '</div>';

    // Project type
    html += briefSection("Project", a.type ? labels.type[a.type] : '<span class="muted">Not specified</span>', a.type ? "" : "muted");

    // Platform
    html += briefSection("Platform", a.platform ? labels.platform[a.platform] : '<span class="muted">Not specified</span>', a.platform ? "" : "muted");

    // Recommended Stack
    html += briefSection("Recommended Stack", a.stack ? labels.stack[a.stack] : '<span class="muted">Not specified</span>', a.stack ? "" : "muted");

    // Complexity
    html += briefSection("Complexity", a.size ? labels.size[a.size] : '<span class="muted">Not specified</span>', a.size ? "" : "muted");

    // Estimated Investment
    if (est) {
      html += briefSection("Estimated Investment", est.rangeStr, "bold");
    } else {
      html += briefSection("Estimated Investment", '<span class="muted">Insufficient data — needs project type</span>', "muted");
    }

    // Customer Budget
    html += briefSection("Customer Budget", a.budget ? labels.budget[a.budget] : '<span class="muted">Not specified</span>', a.budget ? "" : "muted");

    // Budget Fit
    if (fit) {
      html += briefSection("Budget Fit", '<span class="fit-badge ' + esc(fit.class) + '">' + esc(fit.label) + '</span>', "");
    } else if (a.budget && a.budget !== "not-sure" && !est) {
      html += briefSection("Budget Fit", '<span class="muted">Needs more info</span>', "muted");
    } else {
      html += briefSection("Budget Fit", '<span class="muted">—</span>', "muted");
    }

    // Timeline
    html += briefSection("Timeline", a.timeline ? labels.timeline[a.timeline] : '<span class="muted">Not specified</span>', a.timeline ? "" : "muted");

    // Features
    if (featuresList) {
      html += '<div class="brief-section"><div class="bs-label">Features</div><ul class="bs-list">' + featuresList + '</ul></div>';
    } else {
      html += briefSection("Features", '<span class="muted">Not specified</span>', "muted");
    }

    // Project Notes
    html += '<div class="brief-section"><div class="bs-label">Project Notes</div><div class="bs-value">' + descHtml + '</div></div>';

    // Links
    html += '<div class="brief-section"><div class="bs-label">Links / Examples</div><div class="bs-value">' + linksHtml + '</div></div>';

    // Contact
    html += '<div class="brief-section"><div class="bs-label">Contact</div><div class="bs-value">' + contactHtml + '</div></div>';

    html += '</div>'; // close summary-brief

    // Confidence detail
    if (conf) {
      html += '<div style="font-size:0.82rem;color:var(--ink-mute);margin:-12px 0 20px;padding:0 4px;">Confidence score: ' + conf.label + ' (' + conf.pct + '%) — based on completeness, stack certainty, and detail provided.</div>';
    }

    // Actions
    html += '<div class="summary-actions">' +
      '<button class="btn btn-primary" data-action="copy">📋 Copy brief</button>' +
      '<button class="btn btn-ghost" data-action="back">← Edit answers</button>' +
      '<button class="btn btn-ghost" data-action="restart">Start over</button>' +
    '</div>' +
    '<div class="copy-feedback" id="copyFeedback">✓ Brief copied to clipboard. Paste it anywhere.</div>' +
    '</div>';

    return html;
  }

  function briefSection(label, value, extraClass) {
    return '<div class="brief-section"><div class="bs-label">' + esc(label) + '</div><div class="bs-value ' + (extraClass || "") + '">' + value + '</div></div>';
  }

  function getChoiceNumber(step) {
    return contentSteps.indexOf(step) + 1;
  }

  // ---- Event handlers ----
  function attachHandlers() {
    var startBtn = elWizard.querySelector('[data-action="start"]');
    if (startBtn) { startBtn.addEventListener("click", function() { goNext(); }); }

    var actions = elWizard.querySelectorAll('[data-action]');
    actions.forEach(function(btn) {
      var action = btn.getAttribute("data-action");
      if (action === "back")         btn.addEventListener("click", goBack);
      else if (action === "next")    btn.addEventListener("click", goNext);
      else if (action === "restart") btn.addEventListener("click", restart);
      else if (action === "copy")    btn.addEventListener("click", copyBrief);
    });

    // Option cards
    var cards = elWizard.querySelectorAll(".option-card");
    cards.forEach(function(card) {
      // Skip unsupported platforms — they show the alert but don't select
      var isUnsupported = card.classList.contains("unsupported");
      card.addEventListener("click", function(e) {
        e.preventDefault();
        var val = card.getAttribute("data-value");
        var step = steps[state.stepIndex];

        // Check if this option is unsupported
        var optData = step.options.find(function(o) { return o.value === val; });
        if (optData && optData.unsupported) {
          // Select it to show the alert, but disable Next
          cards.forEach(function(c){ c.classList.remove("selected"); });
          card.classList.add("selected");
          state.answers[step.id] = val;
          updateSnapshot();
          // Re-render to show alert
          render();
          return;
        }

        cards.forEach(function(c){ c.classList.remove("selected"); });
        card.classList.add("selected");
        state.answers[step.id] = val;
        updateSnapshot();
        var nextBtn = elWizard.querySelector('[data-action="next"]');
        if (nextBtn) nextBtn.disabled = false;
      });
    });

    // Text inputs
    var inputs = elWizard.querySelectorAll("[data-field]");
    if (inputs.length) {
      inputs.forEach(function(input) {
        input.addEventListener("input", function() {
          state.answers[input.getAttribute("data-field")] = input.value;
          updateNextBtnState();
          updateSnapshot();
        });
      });
      updateNextBtnState();
    }
  }

  function updateNextBtnState() {
    var step = steps[state.stepIndex];
    if (step.type !== "text") return;
    var allValid = step.fields.every(function(f) {
      if (!f.required) return true;
      var v = state.answers[f.id];
      return v && v.trim().length > 0;
    });
    var nextBtn = elWizard.querySelector('[data-action="next"]');
    if (nextBtn) nextBtn.disabled = !allValid;
  }

  function goNext() {
    if (state.stepIndex < steps.length - 1) {
      state.stepIndex++;
      render();
    }
  }

  function goBack() {
    if (state.stepIndex > 0) {
      state.stepIndex--;
      render();
    }
  }

  function restart() {
    state.stepIndex = 0;
    state.answers = {};
    render();
  }

  // ---- Copy brief (consulting-style output) ----
  function copyBrief() {
    var a = state.answers;
    var est = calculateEstimate();
    var fit = getBudgetFit();
    var conf = getConfidence();
    var now = new Date();
    var dateStr = now.toLocaleDateString("en-AU", { day: "numeric", month: "long", year: "numeric" });

    var lines = [];
    lines.push("Cashie Project Brief");
    lines.push("====================");
    lines.push("Generated: " + dateStr);
    lines.push("");

    // Confidence
    if (conf) {
      lines.push("Confidence: " + conf.label + " (" + conf.pct + "%)");
      lines.push("");
    }

    lines.push("Project");
    lines.push(a.type ? labels.type[a.type] : "Not specified");
    lines.push("");

    lines.push("Platform");
    lines.push(a.platform ? labels.platform[a.platform] : "Not specified");
    lines.push("");

    lines.push("Recommended Stack");
    lines.push(a.stack ? labels.stack[a.stack] : "Not specified");
    lines.push("");

    lines.push("Complexity");
    lines.push(a.size ? labels.size[a.size] : "Not specified");
    lines.push("");

    lines.push("Estimated Investment");
    if (est) lines.push(est.rangeStr);
    else     lines.push("Insufficient data");
    lines.push("");

    lines.push("Customer Budget");
    lines.push(a.budget ? labels.budget[a.budget] : "Not specified");
    lines.push("");

    lines.push("Budget Fit");
    if (fit)        lines.push(fit.label);
    else if (est && a.budget && a.budget !== "not-sure") lines.push("See estimate vs budget above");
    else            lines.push("—");
    lines.push("");

    lines.push("Timeline");
    lines.push(a.timeline ? labels.timeline[a.timeline] : "Not specified");
    lines.push("");

    lines.push("Features");
    if (a.features && a.features.trim()) {
      a.features.trim().split("\n").forEach(function(f) {
        if (f.trim()) lines.push("  · " + f.trim());
      });
    } else {
      lines.push("Not specified");
    }
    lines.push("");

    lines.push("Project Notes");
    lines.push(a.description && a.description.trim() ? a.description.trim() : "Not provided");
    lines.push("");

    lines.push("Links / Examples");
    lines.push(a.links && a.links.trim() ? a.links.trim() : "None provided");
    lines.push("");

    lines.push("Contact");
    var contactParts = [];
    if (a.name) contactParts.push(a.name);
    if (a.project) contactParts.push(a.project);
    if (a["contact-method"]) contactParts.push(a["contact-method"]);
    if (a["contact-details"]) contactParts.push(a["contact-details"]);
    lines.push(contactParts.length ? contactParts.join(" · ") : "Not provided");
    lines.push("");

    lines.push("---");
    lines.push("Built with Cashie's Project Brief Builder");
    lines.push("https://cashie1597.github.io/cashie-portfolio/apply.html");

    var brief = lines.join("\n");

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(brief).then(function() {
        showCopyFeedback();
      }).catch(function() { fallbackCopy(brief); });
    } else {
      fallbackCopy(brief);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); showCopyFeedback(); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showCopyFeedback() {
    var fb = document.getElementById("copyFeedback");
    if (fb) {
      fb.classList.add("show");
      setTimeout(function(){ fb.classList.remove("show"); }, 3000);
    }
  }

  // ---- Init ----
  render();
})();
</script>

</body>
</html>
